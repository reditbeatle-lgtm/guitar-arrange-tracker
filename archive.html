<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ギターアレンジ・トラッカー アーカイブ</title>
<style>
:root{--bg:#faf8f5;--card:#ffffff;--accent:#b5713f;--text:#3a3229;--muted:#8a7d6d;--border:#ece4da;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
.wrap{max-width:1100px;margin:0 auto;padding:24px 18px 60px;}
.back{display:inline-block;color:var(--accent);text-decoration:none;font-size:.95rem;margin-bottom:14px;}
.back:hover{text-decoration:underline;}
header h1{margin:.2em 0 .1em;font-size:1.9rem;color:var(--accent);}
.meta{color:var(--muted);font-size:.95rem;margin-bottom:8px;}
.section{margin-top:36px;}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-bottom:2px solid var(--border);padding-bottom:8px;margin-bottom:18px;}
.section-head h2{font-size:1.35rem;margin:0;color:var(--text);}
.playall{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;padding:8px 15px;border-radius:22px;font-size:.9rem;font-weight:600;white-space:nowrap;transition:background .15s,transform .15s;}
.playall:hover{background:#9c5f33;transform:translateY(-1px);}
.playall.disabled{background:#d8ccbf;pointer-events:none;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:transform .18s ease,box-shadow .18s ease;box-shadow:0 1px 3px rgba(80,60,40,.06);}
.card:hover{transform:translateY(-5px);box-shadow:0 10px 24px rgba(120,80,40,.16);}
.thumb{width:100%;aspect-ratio:16/9;object-fit:cover;background:#eee;display:block;}
.card-body{padding:12px 14px 16px;display:flex;flex-direction:column;gap:5px;}
.card-title{font-size:.98rem;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-channel{color:var(--accent);font-size:.85rem;}
.card-date{color:var(--muted);font-size:.8rem;}
.empty{color:var(--muted);background:var(--card);border:1px dashed var(--border);border-radius:12px;padding:26px;text-align:center;}
footer{margin-top:48px;color:var(--muted);font-size:.8rem;text-align:center;}

ul.arch-list{list-style:none;padding:0;margin:20px 0 0;}
.arch-item{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;box-shadow:0 1px 3px rgba(80,60,40,.06);transition:transform .15s,box-shadow .15s;}
.arch-item:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(120,80,40,.14);}
.arch-item a{display:block;padding:14px 18px;text-decoration:none;color:var(--accent);font-weight:600;font-size:1.05rem;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← 最新版へ</a>
  <header>
    <h1>ギターアレンジ・トラッカー アーカイブ</h1>
    <div class="meta">過去の収集結果一覧（1件）</div>
  </header>
  <ul class="arch-list">
      <li class="arch-item"><a href="archive/2026-07-19.html">2026-07-19</a></li>
  </ul>
</div>
</body>
</html>
