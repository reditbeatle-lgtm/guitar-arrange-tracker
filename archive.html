<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ギターアレンジ・トラッカー アーカイブ</title>
<style>
:root{--bg:#faf8f5;--card:#ffffff;--accent:#b5713f;--text:#3a332e;--muted:#8a7f76;--border:#eadfd4;}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;line-height:1.6;}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px;}
.backlink{display:inline-block;margin-bottom:14px;color:var(--accent);text-decoration:none;font-size:.95rem;}
.backlink:hover{text-decoration:underline;}
header h1{margin:.2em 0 .1em;font-size:1.9rem;color:var(--accent);}
.meta{color:var(--muted);font-size:.9rem;margin-bottom:24px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-bottom:2px solid var(--border);padding-bottom:8px;margin:34px 0 18px;}
.sec-head h2{margin:0;font-size:1.35rem;color:var(--text);}
.playall{background:var(--accent);color:#fff;text-decoration:none;padding:7px 14px;border-radius:22px;font-size:.85rem;white-space:nowrap;transition:opacity .2s;}
.playall:hover{opacity:.85;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:transform .18s ease,box-shadow .18s ease;}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(150,110,70,.18);}
.card img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#eee;}
.card .body{padding:11px 13px 14px;display:flex;flex-direction:column;gap:5px;}
.card .title{font-weight:600;font-size:.96rem;line-height:1.35;color:var(--text);}
.card .ch{font-size:.82rem;color:var(--accent);}
.card .date{font-size:.76rem;color:var(--muted);}
.empty{background:var(--card);border:1px dashed var(--border);border-radius:12px;padding:26px;text-align:center;color:var(--muted);}
footer{margin-top:40px;color:var(--muted);font-size:.8rem;text-align:center;}

ul.arc{list-style:none;padding:0;}
ul.arc li{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;}
ul.arc li a{display:block;padding:14px 18px;text-decoration:none;color:var(--accent);font-weight:600;transition:transform .15s,box-shadow .15s;}
ul.arc li:hover{box-shadow:0 6px 16px rgba(150,110,70,.15);transform:translateY(-2px);}
</style>
</head>
<body>
<div class="wrap">
<a class="backlink" href="index.html">← 最新版へ</a>
<header><h1>ギターアレンジ・トラッカー アーカイブ</h1>

<ul class="arc">

</ul>
<footer>ギターアレンジ・トラッカー — 毎晩自動更新</footer>
</div>
</body>
</html>
