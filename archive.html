<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ギターアレンジ・トラッカー アーカイブ</title>
<style>
:root{--bg:#faf8f5;--card:#ffffff;--accent:#b5713f;--accent-dark:#96592d;--text:#3a332e;--muted:#8a7f75;--border:#eadfd3;}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.6;}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px;}
.back{display:inline-block;color:var(--accent-dark);text-decoration:none;font-size:.9rem;margin-bottom:12px;}
.back:hover{text-decoration:underline;}
header h1{margin:.2em 0 .1em;font-size:1.9rem;color:var(--accent-dark);}
.meta{color:var(--muted);font-size:.95rem;margin-bottom:8px;}
.section-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:36px 0 16px;border-bottom:2px solid var(--border);padding-bottom:8px;}
.section-head h2{margin:0;font-size:1.35rem;color:var(--text);}
.count-badge{color:var(--muted);font-size:.9rem;}
.playall{margin-left:auto;background:var(--accent);color:#fff;text-decoration:none;padding:7px 14px;border-radius:20px;font-size:.85rem;font-weight:600;transition:background .15s;white-space:nowrap;}
.playall:hover{background:var(--accent-dark);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;box-shadow:0 1px 3px rgba(80,60,40,.06);transition:transform .18s ease,box-shadow .18s ease;}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 24px rgba(120,80,40,.16);}
.thumb{width:100%;aspect-ratio:16/9;object-fit:cover;background:#eee;display:block;}
.card-body{padding:12px 13px 14px;display:flex;flex-direction:column;gap:5px;}
.card-title{font-size:.98rem;font-weight:600;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-channel{font-size:.85rem;color:var(--accent-dark);}
.card-date{font-size:.78rem;color:var(--muted);}
.empty{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;text-align:center;color:var(--muted);}
footer{margin-top:48px;color:var(--muted);font-size:.8rem;text-align:center;}
a.arch-link{color:var(--accent-dark);}
ul.arch{list-style:none;padding:0;}
ul.arch li{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;}
ul.arch li a{display:block;padding:14px 18px;text-decoration:none;color:var(--accent-dark);font-weight:600;font-size:1.05rem;transition:background .15s;}
ul.arch li a:hover{background:#f3ece3;}
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← 最新版へ</a>
    <header>
      <h1>ギターアレンジ・トラッカー アーカイブ</h1>
      <div class="meta">過去の検索結果一覧（新しい順・全1件）</div>
    </header>
    <ul class="arch">
      <li><a href="archive/2026-07-15.html">2026-07-15</a></li>
    </ul>
    <footer>自動生成：2026-07-15</footer>
  </div>
</body>
</html>
