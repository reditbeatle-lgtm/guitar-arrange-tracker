<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ギターアレンジ・トラッカー アーカイブ</title>
<style>
:root{
  --bg:#faf8f5; --card:#ffffff; --accent:#b5713f; --text:#3a322c; --muted:#8a7d72;
}
*{box-sizing:border-box;}
body{
  margin:0; padding:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  line-height:1.6;
}
.wrap{max-width:1100px; margin:0 auto; padding:20px 16px 60px;}
.backlink{display:inline-block; color:var(--accent); text-decoration:none; font-size:.95rem; margin-bottom:14px;}
.backlink:hover{text-decoration:underline;}
header h1{font-size:1.8rem; margin:0 0 6px; color:var(--accent);}
.meta{color:var(--muted); font-size:.95rem; margin-bottom:28px;}
.section{margin-bottom:40px;}
.section-head{display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:16px; border-bottom:2px solid #ece3d8; padding-bottom:8px;}
.section-head h2{font-size:1.3rem; margin:0; color:var(--text);}
.section-count{color:var(--muted); font-size:.9rem;}
.play-all{margin-left:auto; background:var(--accent); color:#fff; text-decoration:none; padding:8px 16px; border-radius:999px; font-size:.9rem; font-weight:600; transition:transform .15s ease, box-shadow .15s ease;}
.play-all:hover{transform:translateY(-2px); box-shadow:0 6px 16px rgba(181,113,63,.35);}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:18px;}
.card{display:flex; flex-direction:column; background:var(--card); border-radius:12px; overflow:hidden; text-decoration:none; color:inherit; box-shadow:0 2px 6px rgba(0,0,0,.06); transition:transform .18s ease, box-shadow .18s ease;}
.card:hover{transform:translateY(-5px); box-shadow:0 10px 24px rgba(0,0,0,.14);}
.thumb{width:100%; aspect-ratio:16/9; object-fit:cover; background:#ece3d8; display:block;}
.card-body{padding:12px 14px 16px;}
.card-title{font-size:.98rem; font-weight:600; margin:0 0 8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
.card-channel{font-size:.85rem; color:var(--accent); margin:0 0 4px;}
.card-date{font-size:.8rem; color:var(--muted); margin:0;}
.empty{background:var(--card); border-radius:12px; padding:24px; color:var(--muted); text-align:center;}
.list{list-style:none; padding:0; margin:0;}
.list li{margin:0 0 10px;}
.list a{color:var(--accent); text-decoration:none; font-size:1.05rem;}
.list a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="wrap">
  <a class="backlink" href="index.html">← 最新版へ</a>
  <header>
    <h1>ギターアレンジ・トラッカー アーカイブ</h1>
    <p class="meta">過去のアーカイブ一覧（1件）</p>
  </header>
  <ul class="list">

  </ul>
</div>
</body>
</html>
