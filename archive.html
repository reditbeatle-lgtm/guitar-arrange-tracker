<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ギターアレンジ・トラッカー アーカイブ</title>
  <style>
    :root{
      --bg:#faf8f5; --card:#ffffff; --accent:#b5713f;
      --text:#3a3027; --muted:#8a7f73; --line:#ece5db;
    }
    *{box-sizing:border-box;}
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
      line-height:1.6;
    }
    .wrap{max-width:1100px; margin:0 auto; padding:20px 16px 60px;}
    .back{display:inline-block; color:var(--accent); text-decoration:none; font-size:.9rem; margin-bottom:14px;}
    .back:hover{text-decoration:underline;}
    header h1{margin:0 0 6px; font-size:1.7rem; color:var(--accent);}
    .subtitle{color:var(--muted); font-size:.92rem; margin-bottom:8px;}
    .sec-head{display:flex; align-items:center; flex-wrap:wrap; gap:12px; margin:34px 0 16px; border-bottom:2px solid var(--line); padding-bottom:8px;}
    .sec-head h2{margin:0; font-size:1.25rem; color:var(--text);}
    .playall{
      background:var(--accent); color:#fff; text-decoration:none;
      font-size:.82rem; padding:6px 12px; border-radius:999px; white-space:nowrap;
      transition:background .15s ease;
    }
    .playall:hover{background:#9c5e30;}
    .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px;}
    .card{
      display:flex; flex-direction:column; background:var(--card);
      border:1px solid var(--line); border-radius:12px; overflow:hidden;
      text-decoration:none; color:inherit;
      transition:transform .15s ease, box-shadow .15s ease;
    }
    .card:hover{transform:translateY(-4px); box-shadow:0 8px 20px rgba(120,90,60,.18);}
    .thumb{aspect-ratio:16/9; background:#eee; overflow:hidden;}
    .thumb img{width:100%; height:100%; object-fit:cover; display:block;}
    .meta{padding:10px 12px 14px;}
    .title{font-size:.92rem; font-weight:600; margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
    .channel{font-size:.8rem; color:var(--muted);}
    .date{font-size:.75rem; color:var(--muted); margin-top:2px;}
    .empty{color:var(--muted); padding:10px 0;}
    footer{margin-top:48px; color:var(--muted); font-size:.8rem; text-align:center;}
    .arc-list{list-style:none; padding:0; margin:18px 0 0;}
    .arc-list li{margin:0 0 4px;}
    .arc-list a{
      display:inline-block; color:var(--accent); text-decoration:none;
      padding:8px 14px; background:var(--card); border:1px solid var(--line);
      border-radius:10px; transition:transform .12s ease, box-shadow .12s ease;
    }
    .arc-list a:hover{transform:translateY(-2px); box-shadow:0 6px 16px rgba(120,90,60,.15);}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← 最新ページへ</a>
    <header>
      <h1>ギターアレンジ・トラッカー アーカイブ</h1>
      <div class="subtitle">過去の検索結果一覧（3 日分）</div>
    </header>
    <section>
      <ul class="arc-list">
        <li><a href="archive/2026-07-01.html">2026-07-01</a></li>
        <li><a href="archive/2026-06-30.html">2026-06-30</a></li>
        <li><a href="archive/2026-06-29.html">2026-06-29</a></li>
      </ul>
    </section>
  </div>
</body>
</html>
