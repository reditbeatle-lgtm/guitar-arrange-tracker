<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ギターアレンジ・トラッカー アーカイブ</title>
<style>
:root{ --bg:#faf8f5; --card:#ffffff; --accent:#b5713f; --text:#3a322c; --muted:#8a7d70; }
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;line-height:1.6;}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px;}
.backlink{display:inline-block;margin-bottom:14px;color:var(--accent);text-decoration:none;font-size:.95rem;}
.backlink:hover{text-decoration:underline;}
header h1{font-size:1.8rem;margin:0 0 6px;color:var(--accent);}
.meta{color:var(--muted);font-size:.95rem;margin-bottom:28px;}
.section-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:34px 0 16px;border-bottom:2px solid #ece3d8;padding-bottom:8px;}
.section-head h2{font-size:1.3rem;margin:0;color:var(--text);}
.playall{background:var(--accent);color:#fff;text-decoration:none;padding:6px 14px;border-radius:20px;font-size:.85rem;white-space:nowrap;transition:background .15s;}
.playall:hover{background:#9c5e30;}
.count{color:var(--muted);font-size:.85rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;}
.card{background:var(--card);border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .18s ease,box-shadow .18s ease;display:flex;flex-direction:column;}
.card:hover{transform:translateY(-5px);box-shadow:0 8px 20px rgba(181,113,63,.22);}
.thumb{width:100%;aspect-ratio:16/9;object-fit:cover;background:#eee;display:block;}
.card-body{padding:12px 14px 16px;}
.card-title{font-size:.98rem;font-weight:600;margin:0 0 8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-channel{color:var(--muted);font-size:.85rem;margin:0 0 4px;}
.card-date{color:var(--muted);font-size:.8rem;margin:0;}
.empty{background:var(--card);border-radius:12px;padding:24px;color:var(--muted);text-align:center;}

.archive-list{list-style:none;padding:0;}
.archive-list li{background:var(--card);border-radius:10px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .15s,box-shadow .15s;}
.archive-list li:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(181,113,63,.2);}
.archive-list a{display:block;padding:14px 18px;text-decoration:none;color:var(--text);font-size:1.05rem;font-weight:600;}
.archive-list a:hover{color:var(--accent);}
</style>
</head>
<body>
  <div class="wrap">
    <a class="backlink" href="index.html">← 最新版へ</a>
    <header>
      <h1>ギターアレンジ・トラッカー アーカイブ</h1>
      <p class="meta">過去のアーカイブ一覧（全1件）</p>
    </header>
    <ul class="archive-list">
        <li><a href="archive/2026-06-29.html">2026-06-29</a></li>
    </ul>
  </div>
</body>
</html>
