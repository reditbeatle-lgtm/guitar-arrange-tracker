<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ギターアレンジ・トラッカー アーカイブ</title>
<style>
:root{
  --bg:#faf8f5;
  --card:#ffffff;
  --accent:#b5713f;
  --accent-dark:#8f5526;
  --text:#3a322c;
  --muted:#8a7d70;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,-apple-system,sans-serif;
  line-height:1.6;
}
.wrap{max-width:1080px;margin:0 auto;padding:24px 16px 56px;}
.backlink{display:inline-block;margin-bottom:16px;color:var(--accent-dark);text-decoration:none;font-size:.95rem;}
.backlink:hover{text-decoration:underline;}
header h1{font-size:1.8rem;margin:0 0 6px;color:var(--accent-dark);}
.meta{color:var(--muted);font-size:.95rem;margin-bottom:28px;}
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;flex-wrap:wrap;
  border-bottom:2px solid var(--accent);
  padding-bottom:8px;margin:36px 0 20px;
}
.section-head h2{font-size:1.3rem;margin:0;color:var(--accent-dark);}
.playall{
  display:inline-block;background:var(--accent);color:#fff;text-decoration:none;
  padding:7px 14px;border-radius:999px;font-size:.85rem;font-weight:600;
  transition:background .2s ease;white-space:nowrap;
}
.playall:hover{background:var(--accent-dark);}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:18px;
}
.card{
  display:block;background:var(--card);border-radius:12px;overflow:hidden;
  text-decoration:none;color:inherit;
  box-shadow:0 1px 3px rgba(60,40,20,.10);
  transition:transform .18s ease,box-shadow .18s ease;
}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(60,40,20,.18);}
.thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#eee;}
.card-body{padding:12px 14px 14px;}
.card-title{font-size:.98rem;font-weight:600;margin:0 0 6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-channel{font-size:.85rem;color:var(--accent-dark);margin:0 0 2px;}
.card-date{font-size:.78rem;color:var(--muted);margin:0;}
.empty{background:var(--card);border-radius:12px;padding:24px;color:var(--muted);
  box-shadow:0 1px 3px rgba(60,40,20,.10);}
footer{margin-top:40px;color:var(--muted);font-size:.8rem;text-align:center;}

.archive-list{list-style:none;padding:0;margin:0;}
.archive-list li{margin:0 0 4px;}
.archive-list a{
  display:block;background:var(--card);border-radius:10px;
  padding:14px 18px;text-decoration:none;color:var(--accent-dark);
  font-size:1.05rem;font-weight:600;
  box-shadow:0 1px 3px rgba(60,40,20,.10);
  transition:transform .18s ease,box-shadow .18s ease;
}
.archive-list a:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(60,40,20,.18);}
</style>
</head>
<body>
  <div class="wrap">
    <a class="backlink" href="index.html">← 最新版へ</a>
    <header>
      <h1>ギターアレンジ・トラッカー アーカイブ</h1>
      <p class="meta">過去のアーカイブ一覧（1件）</p>
    </header>
    <ul class="archive-list">
        <li><a href="archive/2026-06-29.html">2026-06-29</a></li>
    </ul>
  </div>
</body>
</html>
