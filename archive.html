<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ギターアレンジ・トラッカー アーカイブ</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, sans-serif;
  background: #faf8f5;
  color: #3a332c;
  line-height: 1.6;
}
.wrap { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }
.backlink { display: inline-block; margin-bottom: 14px; color: #b5713f; text-decoration: none; font-size: 0.95rem; }
.backlink:hover { text-decoration: underline; }
header h1 { margin: 4px 0 6px; font-size: 1.9rem; color: #8a5228; letter-spacing: 0.02em; }
.meta { color: #8c8175; font-size: 0.95rem; margin-bottom: 24px; }
.section-head {
  display: flex; align-items: center; flex-wrap: wrap; gap: 12px;
  border-bottom: 2px solid #e7ddd0; padding-bottom: 8px; margin: 34px 0 18px;
}
.section-head h2 { margin: 0; font-size: 1.35rem; color: #8a5228; }
.count-badge { color: #a99a88; font-size: 0.9rem; }
.playall {
  margin-left: auto; background: #b5713f; color: #fff; text-decoration: none;
  padding: 7px 15px; border-radius: 999px; font-size: 0.88rem; font-weight: 600;
  transition: background 0.15s ease, transform 0.15s ease;
}
.playall:hover { background: #9c5f31; transform: translateY(-1px); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }
.card {
  display: block; background: #fff; border-radius: 12px; overflow: hidden;
  text-decoration: none; color: inherit; box-shadow: 0 1px 3px rgba(90,60,30,0.08);
  transition: transform 0.18s ease, box-shadow 0.18s ease;
  border: 1px solid #f0e8dd;
}
.card:hover { transform: translateY(-5px); box-shadow: 0 10px 22px rgba(120,80,40,0.16); }
.thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #eee3d5; }
.card-body { padding: 11px 13px 14px; }
.card-title {
  font-size: 0.96rem; font-weight: 600; margin: 0 0 6px; color: #3a332c;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-channel { font-size: 0.85rem; color: #b5713f; margin: 0 0 2px; }
.card-date { font-size: 0.78rem; color: #a99a88; margin: 0; }
.empty { background: #fff; border: 1px dashed #dccdb8; border-radius: 12px; padding: 30px; text-align: center; color: #8c8175; }
footer { margin-top: 40px; text-align: center; color: #b3a897; font-size: 0.8rem; }

.archive-list { list-style: none; padding: 0; margin: 0; }
.archive-list li { margin: 0 0 10px; }
.archive-list a {
  display: block; background: #fff; border: 1px solid #f0e8dd; border-radius: 10px;
  padding: 14px 18px; text-decoration: none; color: #8a5228; font-weight: 600;
  box-shadow: 0 1px 3px rgba(90,60,30,0.08); transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.archive-list a:hover { transform: translateY(-3px); box-shadow: 0 8px 18px rgba(120,80,40,0.15); }
</style>
</head>
<body>
  <div class="wrap">
    <a class="backlink" href="index.html">← 最新版へ</a>
    <header>
      <h1>ギターアレンジ・トラッカー アーカイブ</h1>
      <p class="meta">過去の収集結果一覧 ／ 全1日分</p>
    </header>
    <ul class="archive-list">
      <li><a href="archive/2026-07-23.html">2026-07-23</a></li>
    </ul>
    <footer>YouTube Data API による自動収集</footer>
  </div>
</body>
</html>
